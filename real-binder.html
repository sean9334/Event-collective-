<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Binder - Cyberlink</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE7ZLZJ8VY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RE7ZLZJ8VY');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --chrome-pink: #ff0844;
            --chrome-purple: #9d4edd;
            --chrome-blue: #00b4d8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #e0f0ff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            animation: spin 60s linear infinite;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.7);
            pointer-events: none;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 105, 180, 0.5);
            border-radius: 50px;
            color: #ff0844;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding-top: 80px;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .real-binder-logo {
            font-family: 'Archivo Black', sans-serif;
            font-size: 4rem;
            font-style: italic;
            background: linear-gradient(135deg, #ff0844, #ff69b4, #ff0844);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoShimmer 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 105, 180, 0.6));
            letter-spacing: -2px;
        }

        @keyframes logoShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo-icon {
            font-size: 3rem;
            margin-left: 10px;
        }

        .subtitle {
            color: #ff69b4;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .add-profile-btn {
            display: inline-block;
            padding: 18px 40px;
            background: linear-gradient(135deg, #ff0844, #ff69b4);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0;
            box-shadow: 0 5px 20px rgba(255, 8, 68, 0.4);
        }

        .add-profile-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.6);
        }

        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            border-color: #ff69b4;
            box-shadow: 0 15px 40px rgba(255, 105, 180, 0.5);
        }

        .profile-image {
            width: 100%;
            height: 350px;
            object-fit: cover;
            background: linear-gradient(135deg, #ffc1e0, #ff69b4);
        }

        .profile-info {
            padding: 25px;
        }

        .profile-catchphrase {
            font-family: 'Archivo Black', sans-serif;
            font-style: italic;
            font-size: 1.3rem;
            color: #ff0844;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .profile-details {
            color: #2b2d42;
            font-size: 1rem;
            margin: 8px 0;
        }

        .profile-details strong {
            color: #ff0844;
        }

        .contact-locked {
            color: #6c757d;
            font-style: italic;
            font-size: 0.9rem;
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 105, 180, 0.1);
            border-radius: 10px;
        }

        .view-contact-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #ff0844, #ff69b4);
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .view-contact-btn:hover {
            transform: scale(1.02);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.6);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #ff0844;
            cursor: pointer;
            background: none;
            border: none;
        }

        .modal h2 {
            font-family: 'Archivo Black', sans-serif;
            font-style: italic;
            color: #ff0844;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: #2b2d42;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-input,
        .form-textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s;
        }

        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #ff69b4;
        }

        .image-upload-container {
            border: 3px dashed #ff69b4;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .image-upload-container:hover {
            background: rgba(255, 105, 180, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff0844, #ff69b4);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.5);
        }

        .password-prompt {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 400px;
            margin: 20px auto;
        }

        .password-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ff69b4;
            border-radius: 10px;
            font-size: 1rem;
            margin: 15px 0;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #b0d5ff;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .real-binder-logo { font-size: 2.5rem; }
            .profiles-grid { grid-template-columns: 1fr; }
            .modal-content { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>

    <a href="index.html" class="back-button">← Back</a>

    <div class="container">
        <div class="header">
            <div class="logo-container">
                <h1 class="real-binder-logo">REAL BINDER<span class="logo-icon">💋</span></h1>
            </div>
            <p class="subtitle">Connect • Authentic • Real</p>
            <button class="add-profile-btn" onclick="openAddProfile()">➕ Add Your Profile</button>
        </div>

        <div id="profilesContainer" class="profiles-grid"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">💌</div>
            <h2>No profiles yet...</h2>
            <p>Be the first to add your profile!</p>
        </div>
    </div>

    <!-- Add Profile Modal -->
    <div id="addProfileModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeAddProfile()">×</button>
            <h2>Create Your Profile</h2>
            
            <form id="profileForm" onsubmit="saveProfile(event)">
                <div class="form-group">
                    <label class="form-label">Your Photo *</label>
                    <div class="image-upload-container" onclick="document.getElementById('imageInput').click()">
                        <div id="imagePreview">📸 Click to upload photo</div>
                        <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Catchphrase *</label>
                    <input type="text" class="form-input" id="catchphrase" placeholder="Your vibe in one line..." required>
                </div>

                <div class="form-group">
                    <label class="form-label">Age *</label>
                    <input type="number" class="form-input" id="age" placeholder="25" min="18" max="120" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Sexual Orientation *</label>
                    <select class="form-input" id="orientation" required>
                        <option value="">Select...</option>
                        <option value="Straight">Straight</option>
                        <option value="Gay">Gay</option>
                        <option value="Lesbian">Lesbian</option>
                        <option value="Bisexual">Bisexual</option>
                        <option value="Pansexual">Pansexual</option>
                        <option value="Asexual">Asexual</option>
                        <option value="Queer">Queer</option>
                        <option value="Questioning">Questioning</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Contact Info (Private) *</label>
                    <input type="text" class="form-input" id="contact" placeholder="Email, phone, Instagram, etc." required>
                    <small style="color: #6c757d;">🔒 Only visible with password</small>
                </div>

                <button type="submit" class="submit-btn">✨ Create Profile</button>
            </form>
        </div>
    </div>

    <!-- Password Prompt Modal -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closePasswordModal()">×</button>
            <div class="password-prompt">
                <h2>🔒 Enter Password</h2>
                <p style="color: #6c757d; margin-bottom: 15px;">Password required to view contact info</p>
                <input type="password" class="password-input" id="passwordInput" placeholder="Enter password...">
                <button class="submit-btn" onclick="checkPassword()">Unlock Contact</button>
            </div>
        </div>
    </div>

    <script>
        let profiles = JSON.parse(localStorage.getItem('realBinderProfiles')) || [];
        let currentImageData = null;
        let currentProfileIndex = null;

        function renderProfiles() {
            const container = document.getElementById('profilesContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (profiles.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            container.innerHTML = profiles.map((profile, index) => `
                <div class="profile-card">
                    <img src="${profile.image}" alt="Profile photo" class="profile-image">
                    <div class="profile-info">
                        <div class="profile-catchphrase">"${profile.catchphrase}"</div>
                        <div class="profile-details"><strong>Age:</strong> ${profile.age}</div>
                        <div class="profile-details"><strong>Orientation:</strong> ${profile.orientation}</div>
                        <div class="contact-locked">🔒 Contact info locked</div>
                        <button class="view-contact-btn" onclick="openPasswordModal(${index})">View Contact</button>
                    </div>
                </div>
            `).join('');
        }

        function openAddProfile() {
            document.getElementById('addProfileModal').classList.add('active');
        }

        function closeAddProfile() {
            document.getElementById('addProfileModal').classList.remove('active');
            document.getElementById('profileForm').reset();
            document.getElementById('imagePreview').innerHTML = '📸 Click to upload photo';
            currentImageData = null;
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" style="max-width: 100%; max-height: 200px; border-radius: 10px;">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function saveProfile(event) {
            event.preventDefault();
            
            if (!currentImageData) {
                alert('Please upload a photo!');
                return;
            }

            const newProfile = {
                image: currentImageData,
                catchphrase: document.getElementById('catchphrase').value,
                age: document.getElementById('age').value,
                orientation: document.getElementById('orientation').value,
                contact: document.getElementById('contact').value,
                timestamp: new Date().toISOString()
            };

            profiles.push(newProfile);
            localStorage.setItem('realBinderProfiles', JSON.stringify(profiles));
            
            renderProfiles();
            closeAddProfile();
        }

        function openPasswordModal(index) {
            currentProfileIndex = index;
            document.getElementById('passwordModal').classList.add('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }

        function closePasswordModal() {
            document.getElementById('passwordModal').classList.remove('active');
            currentProfileIndex = null;
        }

        function checkPassword() {
            const password = document.getElementById('passwordInput').value;
            
            if (password === 'Helloe') {
                const profile = profiles[currentProfileIndex];
                alert(`Contact Info:\n\n${profile.contact}`);
                closePasswordModal();
            } else {
                alert('❌ Incorrect password!');
                document.getElementById('passwordInput').value = '';
            }
        }

        // Allow Enter key in password modal
        document.getElementById('passwordInput')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });

        // Initial render
        renderProfiles();
    </script>
</body>
</html>
