<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Cyberlink</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE7ZLZJ8VY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RE7ZLZJ8VY');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e0e8f0 100%);
            color: #2b2d42;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(157, 78, 221, 0.3) !important;
            border-radius: 50px;
            color: #9d4edd;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #9d4edd !important;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 60px;
        }

        .page-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            font-style: italic;
            text-align: center;
            background: linear-gradient(135deg, #ff4db0, #c060ff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        .elements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .element-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1) !important;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .element-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 60px rgba(157, 78, 221, 0.3) !important;
        }

        .element-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .element-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.8rem;
            font-style: italic;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ff4db0, #9d4edd);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .element-description {
            color: #6c757d;
            line-height: 1.6;
        }

        .affiliate-notice {
            text-align: center;
            max-width: 700px;
            margin: 30px auto;
            padding: 0;
            position: relative;
        }

        .affiliate-notice-text {
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ff4db0, #9d4edd, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .page-title { font-size: 2rem; }
            .elements-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Back to Home</a>

    <div class="container">
        <h1 class="page-title">PRODUCTS</h1>
        <p class="subtitle">Shop by element</p>

        <div class="elements-grid">
            <a href="https://www.amazon.com/s?k=bbq+grill" target="_blank" class="element-card">
                <div class="element-icon">🔥</div>
                <h2 class="element-title">FIRE</h2>
                <p class="element-description">Fire Weapons</p>
            </a>

            <a href="https://www.amazon.com/s?k=water+bottle" target="_blank" class="element-card">
                <div class="element-icon">💧</div>
                <h2 class="element-title">WATER</h2>
                <p class="element-description">Water Products</p>
            </a>

            <a href="https://www.amazon.com/s?k=wind+power" target="_blank" class="element-card">
                <div class="element-icon">💨</div>
                <h2 class="element-title">WIND</h2>
                <p class="element-description">Wind Power</p>
            </a>

            <a href="https://www.amazon.com/s?k=electronics" target="_blank" class="element-card">
                <div class="element-icon">⚡</div>
                <h2 class="element-title">THUNDER</h2>
                <p class="element-description">Electronics</p>
            </a>
        </div>

        <div class="affiliate-notice">
            <span class="affiliate-notice-text">Affiliate links are active - help a local business have a slice of the big boys pie</span>
        </div>
    </div>
</body>
</html>
