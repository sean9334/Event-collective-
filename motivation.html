<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motivation - Event Collective</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #B0E0E6 100%);
            overflow-y: auto;
            overflow-x: hidden;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
        }

        .container {
            width: 100vw;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            padding: 100px 20px 20px;
        }

        .videos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 95vw;
            max-width: 1400px;
        }

        .video-container {
            aspect-ratio: 16 / 9;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        @media (max-width: 768px) {
            .videos-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .container {
                padding: 120px 10px 10px;
            }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .title {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2rem;
            font-weight: 700;
            color: rgba(0, 0, 0, 0.8);
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.5);
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .video-container {
                width: 95vw;
                border-radius: 10px;
            }

            .back-button {
                padding: 12px 24px;
                font-size: 0.85rem;
            }

            .title {
                font-size: 1.5rem;
                top: 80px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Back to Events</a>
    <h1 class="title">Motivation</h1>

    <div class="container">
        <div class="videos-grid">
            <div class="video-container">
                <iframe 
                    src="https://www.youtube-nocookie.com/embed/ZXsQAXx_ao0" 
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
            
            <div class="video-container">
                <iframe 
                    src="https://www.youtube-nocookie.com/embed/5-sfG8BV8wU" 
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
            
            <div class="video-container">
                <iframe 
                    src="https://www.youtube-nocookie.com/embed/Bgqk6t9Be1Q" 
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
            
            <div class="video-container">
                <iframe 
                    src="https://www.youtube-nocookie.com/embed/RoKcHWSr4r8" 
                    title="YouTube video player"
                    frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                    allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>
</body>
</html>
