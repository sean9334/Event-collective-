<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Reading - Cyberlink</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --chrome-pink: #ff0844;
            --chrome-purple: #9d4edd;
            --chrome-blue: #00b4d8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #e0f0ff;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            animation: spin 60s linear infinite;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(235, 235, 235, 0.82);
            pointer-events: none;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(157, 78, 221, 0.3);
            border-radius: 50px;
            color: #9d4edd;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #9d4edd;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 60px;
            position: relative;
            z-index: 10;
        }

        .page-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            font-style: italic;
            text-align: center;
            background: linear-gradient(135deg, #ff0844, #9d4edd, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #90c5ff;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .content-card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(157, 78, 221, 0.3);
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin: 40px 0;
        }

        .tarot-card {
            background: linear-gradient(135deg, #f5f5f0, #e8e8e0);
            border: 4px solid #8b7355;
            border-radius: 15px;
            padding: 0;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        .tarot-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(139, 115, 85, 0.2) 49%, rgba(139, 115, 85, 0.2) 51%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(139, 115, 85, 0.2) 49%, rgba(139, 115, 85, 0.2) 51%, transparent 52%);
            background-size: 20px 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        .tarot-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(157, 78, 221, 0.5);
        }

        .card-inner {
            position: relative;
            z-index: 1;
            padding: 30px 20px;
        }

        .card-frame {
            border: 3px solid #8b7355;
            border-radius: 10px;
            padding: 20px;
            margin: 15px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(245, 245, 240, 0.9));
        }

        .card-symbol {
            font-size: 8rem;
            margin: 20px 0;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
            position: relative;
        }

        .card-symbol::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.2), transparent);
            border-radius: 50%;
            z-index: -1;
        }

        .card-number {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            color: #8b7355;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .card-name {
            font-family: 'Archivo Black', sans-serif;
            font-style: italic;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #8b7355, #5d4a37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            padding: 10px 0;
            border-top: 2px solid #8b7355;
            border-bottom: 2px solid #8b7355;
        }

        .card-meaning {
            color: #2b2d42;
            font-size: 1rem;
            line-height: 1.7;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(139, 115, 85, 0.3);
        }

        .draw-again-btn {
            display: block;
            margin: 40px auto 0;
            padding: 18px 50px;
            background: linear-gradient(135deg, #ff0844, #9d4edd);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
        }

        .draw-again-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.6);
        }

        @media (max-width: 768px) {
            .page-title { font-size: 2rem; }
            .content-card { padding: 30px 20px; }
            .cards-container { grid-template-columns: 1fr; gap: 25px; }
            .card-symbol { font-size: 4rem; }
            .card-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>

    <a href="index.html" class="back-button">← Back</a>

    <div class="container">
        <h1 class="page-title">TAROT READING</h1>
        <p class="subtitle">Your cosmic guidance awaits</p>

        <div class="content-card">
            <div id="revealButton" style="text-align: center; padding: 60px 0;">
                <button class="draw-again-btn" onclick="revealTarotMystery()" style="font-size: 1.8rem; padding: 30px 70px;">
                    🎲 ROLL THE DICE
                </button>
            </div>

            <div id="tarotReading" style="display: none;">
                <div class="cards-container" id="cardsContainer"></div>
                
                <div id="combinedMeaning" style="background: rgba(240, 240, 240, 0.5); border-radius: 15px; padding: 30px; margin: 30px 0; text-align: center;">
                    <h3 style="color: var(--chrome-purple); font-size: 1.4rem; margin-bottom: 20px; font-weight: 700;">What These Cards Mean Together</h3>
                    <p id="meaningText" style="color: #2b2d42; font-size: 1.2rem; line-height: 1.8; font-style: italic;"></p>
                </div>
                
                <button class="draw-again-btn" onclick="drawNewCards()" style="margin-bottom: 40px;">🎲 Roll Again</button>
                
                <div style="text-align: center; padding: 40px 0; border-top: 2px solid rgba(157, 78, 221, 0.3);">
                    <h3 style="color: #2b2d42; font-size: 1.3rem; margin-bottom: 20px; font-weight: 700;">Professional Reading</h3>
                    <p style="color: #6c757d; margin-bottom: 30px;">Want a deeper, personalized tarot reading? Book a session for just £5</p>
                    
                    <a href="https://buy.stripe.com/aFadRb5ILgUHgll5Ew2ZO02" target="_blank" class="draw-again-btn" style="text-decoration: none; display: inline-block;">
                        💳 Pay £5 (Card or Digital Wallet)
                    </a>
                    
                    <p style="color: #6c757d; font-size: 0.9rem; margin-top: 20px; font-style: italic;">After payment, I'll reach out within 24 hours to arrange your personalized reading</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tarotDeck = [
            {
                number: "0",
                name: "The Fool",
                symbol: "🃏",
                meaning: "New beginnings, innocence, spontaneity, and free spirit. The Fool encourages you to embrace the unknown with an open heart and trust in the journey ahead."
            },
            {
                number: "I",
                name: "The Magician",
                symbol: "🎩",
                meaning: "Manifestation, resourcefulness, power, and inspired action. You have all the tools you need to create the reality you desire."
            },
            {
                number: "II",
                name: "The High Priestess",
                symbol: "🌙",
                meaning: "Intuition, sacred knowledge, divine feminine, and the subconscious mind. Trust your inner voice and pay attention to your dreams."
            },
            {
                number: "III",
                name: "The Empress",
                symbol: "👑",
                meaning: "Femininity, beauty, nature, nurturing, and abundance. A time of growth and creativity is upon you."
            },
            {
                number: "IV",
                name: "The Emperor",
                symbol: "⚔️",
                meaning: "Authority, establishment, structure, and father figure. Take control and create order from chaos."
            },
            {
                number: "V",
                name: "The Hierophant",
                symbol: "📿",
                meaning: "Spiritual wisdom, religious beliefs, conformity, tradition. Seek guidance from established systems and mentors."
            },
            {
                number: "VI",
                name: "The Lovers",
                symbol: "💕",
                meaning: "Love, harmony, relationships, values alignment, and choices. A significant relationship or decision awaits."
            },
            {
                number: "VII",
                name: "The Chariot",
                symbol: "🏇",
                meaning: "Control, willpower, success, action, and determination. Move forward with confidence and purpose."
            },
            {
                number: "VIII",

                symbol: "🦁",
                meaning: "Inner strength, courage, persuasion, influence, and compassion. Face challenges with grace and patience."
            },
            {
                number: "IX",
                name: "The Hermit",
                symbol: "🕯️",
                meaning: "Soul searching, introspection, being alone, and inner guidance. Take time for solitude and reflection."
            },
            {
                number: "X",
                name: "Wheel of Fortune",
                symbol: "☸️",
                meaning: "Good luck, karma, life cycles, destiny, and turning point. Change is coming - embrace the cycle."
            },
            {
                number: "XI",
                name: "Justice",
                symbol: "⚖️",
                meaning: "Justice, fairness, truth, cause and effect, and law. Truth will prevail and balance will be restored."
            },
            {
                number: "XII",
                name: "The Hanged Man",
                symbol: "🙃",
                meaning: "Pause, surrender, letting go, and new perspectives. Sometimes you must pause to gain clarity."
            },
            {
                number: "XIII",
                name: "Death",
                symbol: "💀",
                meaning: "Endings, change, transformation, and transition. An old chapter closes to make way for rebirth."
            },
            {
                number: "XIV",
                name: "Temperance",
                symbol: "⚗️",
                meaning: "Balance, moderation, patience, purpose, and meaning. Find the middle path and blend opposing forces."
            },
            {
                number: "XV",
                name: "The Devil",
                symbol: "😈",
                meaning: "Shadow self, attachment, addiction, restriction, and sexuality. Recognize what binds you and choose freedom."
            },
            {
                number: "XVI",
                name: "The Tower",
                symbol: "⚡",
                meaning: "Sudden change, upheaval, chaos, revelation, and awakening. Destruction clears the way for reconstruction."
            },
            {
                number: "XVII",
                name: "The Star",
                symbol: "⭐",
                meaning: "Hope, faith, purpose, renewal, and spirituality. After darkness comes light and renewed hope."
            },
            {
                number: "XVIII",
                name: "The Moon",
                symbol: "🌕",
                meaning: "Illusion, fear, anxiety, subconscious, and intuition. Not all is as it seems - trust your instincts."
            },
            {
                number: "XIX",
                name: "The Sun",
                symbol: "☀️",
                meaning: "Positivity, fun, warmth, success, and vitality. Joy and abundance shine upon you now."
            },
            {
                number: "XX",
                name: "Judgement",
                symbol: "📯",
                meaning: "Judgement, rebirth, inner calling, and absolution. A time of reckoning and spiritual awakening."
            },
            {
                number: "XXI",
                name: "The World",
                symbol: "🌍",
                meaning: "Completion, integration, accomplishment, and travel. You've come full circle and achieved wholeness."
            }
        ];

        function revealTarotMystery() {
            document.getElementById('revealButton').style.display = 'none';
            document.getElementById('tarotReading').style.display = 'block';
            drawNewCards();
        }

        function drawNewCards() {
            const container = document.getElementById('cardsContainer');
            const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
            const drawnCards = shuffled.slice(0, 2);

            container.innerHTML = drawnCards.map(card => `
                <div class="tarot-card">
                    <div class="card-inner">
                        <div class="card-frame">
                            <div class="card-number">${card.number}</div>
                            <div class="card-symbol">${card.symbol}</div>
                            <div class="card-name">${card.name}</div>
                            <p class="card-meaning">${card.meaning}</p>
                        </div>
                    </div>
                </div>
            `).join('');

            // Generate combined meaning
            const combinedMeaning = generateCombinedMeaning(drawnCards[0], drawnCards[1]);
            document.getElementById('meaningText').textContent = combinedMeaning;
        }

        function generateCombinedMeaning(card1, card2) {
            const meanings = [
                "This powerful combination suggests a time of profound transformation. Embrace the changes ahead while staying grounded in your truth and authentic self. What may feel uncertain now is actually clearing the path for something more aligned with your highest good.",
                
                "Together, these cards speak of the delicate balance between taking action and allowing space for reflection. This is not a time to rush forward impulsively, nor is it a time to remain completely still. Find the sweet spot between doing and being, and let your inner wisdom guide each step.",
                
                "This pairing indicates a journey from darkness into light, suggesting you may be moving through a challenging period. The struggles you're facing now are preparing you for greater wisdom and understanding. Trust that the difficulty has purpose, and brighter days are ahead.",
                
                "These energies combined suggest it's time to release the old to make space for new beginnings. Whether it's outdated beliefs, relationships, or patterns, the universe is asking you to let go. Create space for the new by honoring what was and releasing it with gratitude.",
                
                "This reading points to inner strength meeting outer opportunity in perfect timing. You've been building your foundation, and now the universe is presenting opportunities that match your evolution. Trust that you're ready for what's coming, even if it feels bigger than anything you've done before.",
                
                "The union of these cards reveals the profound importance of knowing when to be patient and when to take decisive action. Some situations require you to wait and observe, while others demand bold moves. Learn to feel the difference, and you'll navigate life with much greater ease.",
                
                "This combination speaks of emotional healing that comes through honest, compassionate self-reflection. You're being guided to look within and face aspects of yourself you may have been avoiding. True healing begins when we stop running from ourselves and offer ourselves the love we've been seeking externally.",
                
                "Together, they indicate a creative breakthrough emerging from the marriage of structured thinking and wild imagination. Use logic to build the container, and let imagination fill it with magic. This synthesis of left brain and right brain will produce something truly remarkable.",
                
                "This pairing suggests that relationships and partnerships are taking center stage in your life right now. Collaboration, rather than going it alone, will bring unexpected rewards and open doors you didn't even know existed. Be willing to trust, share, and build together with the right people.",
                
                "These cards together point to both material and spiritual abundance flowing toward you. Your job is to remain open to receive in whatever form abundance wants to arrive. Release any beliefs about scarcity or unworthiness, and know that you're deserving of good things.",
                
                "This reading shows the profound need to trust the process, especially when the path ahead isn't clear. Sometimes the most important journeys require us to walk by faith rather than by sight. Trust that every step is guided, even when you can't see where it's leading.",
                
                "The combination suggests you're breaking free from limitations that have held you back for too long. You're waking up to your own power and possibility as you realize many boundaries were self-imposed. This liberation may feel both exhilarating and terrifying - both reactions are normal when we step into our potential.",
                
                "Together, these energies speak of finding peace through radical acceptance of what is. When we release the need to force outcomes and instead accept what life is presenting, we discover a deep inner peace. This doesn't mean giving up - it means working with life rather than against it.",
                
                "This pairing indicates that your consistent effort and hard work are building something truly lasting. Every small step is contributing to a larger vision that's taking shape. Stay committed to what you're building - your patience and dedication will pay off.",
                
                "These cards combined suggest your higher self has an important message for you right now. Pay close attention to your dreams, the synchronicities appearing in your life, and those quiet intuitive nudges. The messages are there - you just need to tune in.",
                
                "This reading points to the transformative power of authentic communication. There's something important you need to express, or perhaps you need to create space for someone else to share their truth. When we communicate authentically, we create the foundation for genuine connection and understanding.",
                
                "Together, they show that victory and breakthrough are emerging from the struggles you've been facing. Your persistence through difficulty is about to pay off in significant ways. Don't give up now - you're closer than you think to a major turning point.",
                
                "This combination speaks of renewal, fresh starts, and the ending of an old cycle. Honor what's ending while getting excited about what's beginning. Endings are not failures - they're necessary transitions that make space for new possibilities to emerge.",
                
                "The pairing suggests that wisdom is being gained through your lived experiences. All the lessons you've learned and growth you've achieved are forming a deep well of understanding. Trust the wisdom you've earned - your experiences have taught you things that can only be learned by walking your unique path.",
                
                "These cards together indicate that the universe is aligning in your favor in powerful ways. Doors are opening, opportunities are appearing, and things are falling into place with almost magical timing. This is your moment to move forward with confidence and trust."
            ];
            
            return meanings[Math.floor(Math.random() * meanings.length)];
        }
    </script>
</body>
</html>
