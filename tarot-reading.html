<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarot Reading - Cyberlink</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --chrome-pink: #ff0844;
            --chrome-purple: #9d4edd;
            --chrome-blue: #00b4d8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #e0f0ff;
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            animation: spin 60s linear infinite;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(235, 235, 235, 0.82);
            pointer-events: none;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(157, 78, 221, 0.3);
            border-radius: 50px;
            color: #9d4edd;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #9d4edd;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 60px;
            position: relative;
            z-index: 10;
        }

        .page-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            font-style: italic;
            text-align: center;
            background: linear-gradient(135deg, #ff0844, #9d4edd, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #90c5ff;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .content-card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(157, 78, 221, 0.3);
        }

        .cards-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin: 40px 0;
        }

        .tarot-card {
            background: linear-gradient(135deg, #f5f5f0, #e8e8e0);
            border: 4px solid #8b7355;
            border-radius: 15px;
            padding: 0;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
        }

        .tarot-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(45deg, transparent 48%, rgba(139, 115, 85, 0.2) 49%, rgba(139, 115, 85, 0.2) 51%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(139, 115, 85, 0.2) 49%, rgba(139, 115, 85, 0.2) 51%, transparent 52%);
            background-size: 20px 20px;
            opacity: 0.3;
            pointer-events: none;
        }

        .tarot-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(157, 78, 221, 0.5);
        }

        .card-inner {
            position: relative;
            z-index: 1;
            padding: 30px 20px;
        }

        .card-frame {
            border: 3px solid #8b7355;
            border-radius: 10px;
            padding: 20px;
            margin: 15px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.9), rgba(245, 245, 240, 0.9));
        }

        .card-symbol {
            font-size: 8rem;
            margin: 20px 0;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.3));
            position: relative;
        }

        .card-symbol::before {
            content: '';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, rgba(157, 78, 221, 0.2), transparent);
            border-radius: 50%;
            z-index: -1;
        }

        .card-number {
            font-family: 'Archivo Black', sans-serif;
            font-size: 1.5rem;
            color: #8b7355;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .card-name {
            font-family: 'Archivo Black', sans-serif;
            font-style: italic;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #8b7355, #5d4a37);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            padding: 10px 0;
            border-top: 2px solid #8b7355;
            border-bottom: 2px solid #8b7355;
        }

        .card-meaning {
            color: #2b2d42;
            font-size: 1rem;
            line-height: 1.7;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(139, 115, 85, 0.3);
        }

        .draw-again-btn {
            display: block;
            margin: 40px auto 0;
            padding: 18px 50px;
            background: linear-gradient(135deg, #ff0844, #9d4edd);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(157, 78, 221, 0.4);
        }

        .draw-again-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.6);
        }

        @media (max-width: 768px) {
            .page-title { font-size: 2rem; }
            .content-card { padding: 30px 20px; }
            .cards-container { grid-template-columns: 1fr; gap: 25px; }
            .card-symbol { font-size: 4rem; }
            .card-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>

    <a href="index.html" class="back-button">← Back</a>

    <div class="container">
        <h1 class="page-title">TAROT READING</h1>
        <p class="subtitle">Your cosmic guidance awaits</p>

        <div class="content-card">

            <button class="draw-again-btn" onclick="drawNewCards()">🔮 Draw New Cards</button>
            
            <div style="text-align: center; padding: 40px 0; margin-top: 40px; border-top: 2px solid rgba(157, 78, 221, 0.3);">
                <h3 style="color: #2b2d42; font-size: 1.3rem; margin-bottom: 20px; font-weight: 700;">Professional Reading</h3>
                <p style="color: #6c757d; margin-bottom: 30px;">Want a deeper, personalized tarot reading? Book a session for just £2</p>
                
                <a href="https://www.paypal.com/paypalme/sean9334/2GBP" target="_blank" class="draw-again-btn" style="text-decoration: none; display: inline-block;">
                    💳 Pay £2 (PayPal or Card)
                </a>
                
                <p style="color: #6c757d; font-size: 0.9rem; margin-top: 20px; font-style: italic;">After payment, I'll reach out within 24 hours to arrange your personalized reading</p>

            },

            },
            {

                meaning: "Intuition, sacred knowledge, divine feminine, and the subconscious mind. Trust your inner voice and pay attention to your dreams."
            },
            {

        function drawNewCards() {
            const container = document.getElementById('cardsContainer');
            const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
            const drawnCards = shuffled.slice(0, 2);

            container.innerHTML = drawnCards.map(card => `
                <div class="tarot-card">
                    <div class="card-inner">
                        <div class="card-frame">
                            <div class="card-number">${card.number}</div>
                            <div class="card-symbol">${card.symbol}</div>
                            <div class="card-name">${card.name}</div>
                            <p class="card-meaning">${card.meaning}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Draw initial cards on page load
        drawNewCards();
    </script>
</body>
