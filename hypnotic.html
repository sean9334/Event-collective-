<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypnotic Spiral - Event Collective</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .spiral-container {
            width: 141vmax;
            height: 141vmax;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .warning {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            text-align: center;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .back-button {
                padding: 12px 24px;
                font-size: 0.85rem;
            }

            .warning {
                font-size: 0.7rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Back to Events</a>

    <div class="container">
        <div class="spiral-container">
            <canvas id="spiralCanvas"></canvas>
        </div>
    </div>

    <div class="warning">
        ⚠️ Epilepsy warning: Rotating patterns
    </div>

    <script>
        const canvas = document.getElementById('spiralCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = 2000;
        canvas.height = 2000;
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // Fill background
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw spiral arms
        const numArms = 16; // Number of black/white pairs
        const maxRadius = 1000;
        const rotations = 8; // How many times to spiral around
        
        for (let arm = 0; arm < numArms; arm++) {
            // Alternate between white and dark
            ctx.fillStyle = arm % 2 === 0 ? '#e6e6fa' : '#1a1a2e';
            
            ctx.beginPath();
            
            // Start from center
            ctx.moveTo(centerX, centerY);
            
            // Draw spiral arm outward
            const angleOffset = (arm * Math.PI * 2) / numArms;
            const nextAngleOffset = ((arm + 1) * Math.PI * 2) / numArms;
            
            // Outer edge of spiral
            for (let angle = 0; angle <= rotations * Math.PI * 2; angle += 0.05) {
                const radius = (angle / (rotations * Math.PI * 2)) * maxRadius;
                const x = centerX + radius * Math.cos(angle + angleOffset);
                const y = centerY + radius * Math.sin(angle + angleOffset);
                ctx.lineTo(x, y);
            }
            
            // Come back along the next arm's edge
            for (let angle = rotations * Math.PI * 2; angle >= 0; angle -= 0.05) {
                const radius = (angle / (rotations * Math.PI * 2)) * maxRadius;
                const x = centerX + radius * Math.cos(angle + nextAngleOffset);
                const y = centerY + radius * Math.sin(angle + nextAngleOffset);
                ctx.lineTo(x, y);
            }
            
            ctx.closePath();
            ctx.fill();
        }
        
        // Draw center white dot
        ctx.fillStyle = '#e6e6fa';
        ctx.beginPath();
        ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
        ctx.fill();
    </script>
</body>
</html>
