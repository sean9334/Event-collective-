<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hypnotic Spiral - Event Collective</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE7ZLZJ8VY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RE7ZLZJ8VY');
    </script>
    
    <style>
        /* Warning Overlay */
        .warning-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .warning-overlay.hidden {
            display: none;
        }

        .warning-box {
            background: white;
            padding: 50px;
            border-radius: 20px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .warning-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .warning-box h2 {
            color: #ff4db0;
            margin-bottom: 20px;
            font-size: 2rem;
        }

        .warning-box p {
            color: #2b2d42;
            line-height: 1.8;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .warning-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .warning-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .accept-btn {
            background: linear-gradient(135deg, #ff4db0, #9d4edd);
            color: white;
        }

        .accept-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(157, 78, 221, 0.4);
        }

        .decline-btn {
            background: #e0e8f0;
            color: #2b2d42;
        }

        .decline-btn:hover {
            background: #d0d8e0;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .spiral-container {
            width: 141vmax;
            height: 141vmax;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .warning {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.8rem;
            text-align: center;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .back-button {
                padding: 12px 24px;
                font-size: 0.85rem;
            }

            .warning {
                font-size: 0.7rem;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="warning-overlay" id="warningOverlay">
        <div class="warning-box">
            <div class="warning-icon">⚠️</div>
            <h2>Epilepsy Warning</h2>
            <p>This page contains rapidly rotating patterns and visual effects that may cause discomfort or trigger seizures for people with photosensitive epilepsy.</p>
            <p><strong>Please proceed with caution.</strong></p>
            <div class="warning-buttons">
                <button class="warning-btn decline-btn" onclick="goBack()">Go Back</button>
                <button class="warning-btn accept-btn" onclick="acceptWarning()">I Understand, Continue</button>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-button">← Back to Events</a>

    <div class="container">
        <div class="spiral-container">
            <canvas id="spiralCanvas"></canvas>
        </div>
    </div>

    <div class="warning">
        ⚠️ Epilepsy warning: Rotating patterns
    </div>

    <script>
        function acceptWarning() {
            document.getElementById('warningOverlay').classList.add('hidden');
        }

        function goBack() {
            window.location.href = 'magic.html';
        }

        const canvas = document.getElementById('spiralCanvas');
        const ctx = canvas.getContext('2d');
        
        // Set canvas size
        canvas.width = 2000;
        canvas.height = 2000;
        
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        // Fill background
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Draw spiral arms
        const numArms = 16; // Number of black/white pairs
        const maxRadius = 1000;
        const rotations = 8; // How many times to spiral around
        
        for (let arm = 0; arm < numArms; arm++) {
            // Alternate between white and dark
            ctx.fillStyle = arm % 2 === 0 ? '#e6e6fa' : '#1a1a2e';
            
            ctx.beginPath();
            
            // Start from center
            ctx.moveTo(centerX, centerY);
            
            // Draw spiral arm outward
            const angleOffset = (arm * Math.PI * 2) / numArms;
            const nextAngleOffset = ((arm + 1) * Math.PI * 2) / numArms;
            
            // Outer edge of spiral
            for (let angle = 0; angle <= rotations * Math.PI * 2; angle += 0.05) {
                const radius = (angle / (rotations * Math.PI * 2)) * maxRadius;
                const x = centerX + radius * Math.cos(angle + angleOffset);
                const y = centerY + radius * Math.sin(angle + angleOffset);
                ctx.lineTo(x, y);
            }
            
            // Come back along the next arm's edge
            for (let angle = rotations * Math.PI * 2; angle >= 0; angle -= 0.05) {
                const radius = (angle / (rotations * Math.PI * 2)) * maxRadius;
                const x = centerX + radius * Math.cos(angle + nextAngleOffset);
                const y = centerY + radius * Math.sin(angle + nextAngleOffset);
                ctx.lineTo(x, y);
            }
            
            ctx.closePath();
            ctx.fill();
        }
        
        // Draw center white dot
        ctx.fillStyle = '#e6e6fa';
        ctx.beginPath();
        ctx.arc(centerX, centerY, 20, 0, Math.PI * 2);
        ctx.fill();
    </script>
</body>
</html>
