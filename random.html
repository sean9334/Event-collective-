<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random - Cyberlink</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE7ZLZJ8VY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RE7ZLZJ8VY');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e0e8f0 100%);
            color: #2b2d42;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(157, 78, 221, 0.3);
            border-radius: 50px;
            color: #9d4edd;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #9d4edd;
            transform: translateY(-2px);
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .mystery-button {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4db0, #9d4edd, #00d4ff);
            background-size: 200% 200%;
            border: none;
            font-size: 4rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 20px 60px rgba(157, 78, 221, 0.4);
            animation: gradientShift 3s ease infinite;
            position: relative;
            opacity: 1;
        }

        .mystery-button.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .mystery-button:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 30px 80px rgba(157, 78, 221, 0.6);
        }

        .mystery-button:active {
            transform: scale(0.95);
        }

        .button-text {
            display: block;
            margin-top: 30px;
            font-size: 1.5rem;
            font-weight: 600;
            color: #9d4edd;
            opacity: 0;
            animation: fadeInThenOut 5s ease forwards;
        }

        @keyframes fadeInThenOut {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

        /* Animation Container */
        .animation-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 120px;
            pointer-events: none;
            z-index: 100;
        }

        .animation-content {
            text-align: center;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .animation-content.active {
            opacity: 1;
            transform: scale(1);
        }

        .animation-content.hiding {
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .emoji-display {
            font-size: 10rem;
            animation: bounceIn 0.8s ease;
            margin-bottom: 40px;
        }

        @keyframes bounceIn {
            0% { transform: scale(0) translateY(0); }
            50% { transform: scale(1.2) translateY(-20px); }
            100% { transform: scale(1) translateY(0); }
        }

        .text-display {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            font-style: italic;
            margin-top: 40px;
            background: linear-gradient(135deg, #ff4db0, #9d4edd, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            filter: 
                brightness(1.3)
                drop-shadow(0 0 20px rgba(255, 255, 255, 0.8))
                drop-shadow(0 0 40px rgba(157, 78, 221, 0.6));
            animation: fadeInText 0.8s ease;
            padding: 0 20px;
        }

        @keyframes fadeInText {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Emoji burst effect */
        .emoji-burst {
            position: absolute;
            font-size: 3rem;
            animation: burstOut 1s ease forwards;
            pointer-events: none;
        }

        @keyframes burstOut {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0.5);
            }
        }

        @media (max-width: 768px) {
            .mystery-button { width: 150px; height: 150px; font-size: 3rem; }
            .emoji-display { font-size: 6rem; margin-bottom: 30px; }
            .text-display { font-size: 1.8rem; padding: 0 30px; margin-top: 30px; }
        }
    </style>
</head>
<body>
    <a href="magic.html" class="back-button">← Back to Magic</a>

    <div class="container">
        <button class="mystery-button" onclick="triggerAnimation()">🎲</button>
        <span class="button-text">Click Me!</span>
    </div>

    <div class="animation-container">
        <div class="animation-content" id="animationContent"></div>
    </div>

    <script>
        const animations = [
            {
                emoji: '🙌',
                text: 'High fives all round!'
            },
            {
                emoji: '🤔',
                text: 'What do you love talking about the most in this world?'
            },
            {
                emoji: '💭',
                text: 'Do you have a dream?'
            },
            {
                emoji: '✨',
                text: 'Quick magic trick!'
            }
        ];

        let currentIndex = 0;

        function createEmojiBurst(emoji, x, y) {
            for (let i = 0; i < 12; i++) {
                const burst = document.createElement('div');
                burst.className = 'emoji-burst';
                burst.textContent = emoji;
                burst.style.left = x + 'px';
                burst.style.top = y + 'px';
                
                const angle = (Math.PI * 2 * i) / 12;
                const distance = 200;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                burst.style.setProperty('--tx', tx + 'px');
                burst.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(burst);
                
                setTimeout(() => burst.remove(), 1000);
            }
        }

        function triggerAnimation() {
            const content = document.getElementById('animationContent');
            const button = document.querySelector('.mystery-button');
            const rect = button.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            // Don't trigger if animation is already showing
            if (content.classList.contains('active')) {
                return;
            }
            
            // Hide the dice button
            button.classList.add('hidden');
            
            // Get current animation sequentially
            const selected = animations[currentIndex];
            currentIndex = (currentIndex + 1) % animations.length; // Loop back to start
            
            // Create emoji burst
            createEmojiBurst(selected.emoji, centerX, centerY);
            
            // Show animation
            content.innerHTML = `
                <div class="emoji-display">${selected.emoji}</div>
                <div class="text-display">${selected.text}</div>
            `;
            
            // Add active class to show animation
            content.classList.remove('hiding');
            content.classList.add('active');
            
            // Hide after 2 seconds (half the original time)
            setTimeout(() => {
                content.classList.remove('active');
                content.classList.add('hiding');
                
                // Show dice button again
                button.classList.remove('hidden');
                
                // Clean up after transition completes
                setTimeout(() => {
                    content.classList.remove('hiding');
                }, 500);
            }, 2000);
        }
    </script>
</body>
</html>
