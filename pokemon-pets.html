<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Pets - Cyberlink</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE7ZLZJ8VY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RE7ZLZJ8VY');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --chrome-pink: #ff0844;
            --chrome-purple: #9d4edd;
            --chrome-blue: #00b4d8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #e0f0ff;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
            animation: spin 60s linear infinite;
        }

        @keyframes spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.7);
            pointer-events: none;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 8, 68, 0.5);
            border-radius: 50px;
            color: #ff0844;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            transform: translateY(-2px);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding-top: 80px;
            position: relative;
            z-index: 10;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .pokemon-logo {
            font-family: 'Archivo Black', sans-serif;
            font-size: 4rem;
            font-style: italic;
            background: linear-gradient(135deg, #ff0844, #00b4d8, #ff0844);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoShimmer 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255, 8, 68, 0.6));
            letter-spacing: -2px;
        }

        @keyframes logoShimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            color: #ff0844;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        .add-pokemon-btn {
            display: inline-block;
            padding: 18px 40px;
            background: linear-gradient(135deg, #ff0844, #00b4d8);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 20px 0;
            box-shadow: 0 5px 20px rgba(255, 8, 68, 0.4);
        }

        .add-pokemon-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 8, 68, 0.6);
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .pokemon-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s;
            cursor: pointer;
            border: 3px solid transparent;
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            border-color: #ff0844;
            box-shadow: 0 15px 40px rgba(255, 8, 68, 0.5);
        }

        .pokemon-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            background: linear-gradient(135deg, #ffc1e0, #00b4d8);
        }

        /* Lightbox for full image view */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
        }

        .lightbox-image {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(255, 8, 68, 0.6);
        }

        .close-lightbox {
            position: absolute;
            top: -50px;
            right: 0;
            font-size: 3rem;
            color: white;
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 300;
            transition: all 0.3s;
        }

        .close-lightbox:hover {
            color: #ff0844;
            transform: scale(1.1);
        }

        /* Modal for adding pokemon */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            position: relative;
            box-shadow: 0 20px 60px rgba(255, 8, 68, 0.6);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #ff0844;
            cursor: pointer;
            background: none;
            border: none;
        }

        .modal h2 {
            font-family: 'Archivo Black', sans-serif;
            font-style: italic;
            color: #ff0844;
            margin-bottom: 25px;
            font-size: 2rem;
        }

        .image-upload-container {
            border: 3px dashed #ff0844;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .image-upload-container:hover {
            background: rgba(255, 8, 68, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ff0844, #00b4d8);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 8, 68, 0.5);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #b0d5ff;
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .pokemon-logo { font-size: 2.5rem; }
            .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
            .pokemon-image { height: 180px; }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>

    <a href="index.html" class="back-button">← Back</a>

    <div class="container">
        <div class="header">
            <h1 class="pokemon-logo">POKEMON PETS 🔥</h1>
            <p class="subtitle">Catch 'Em All</p>
            <button class="add-pokemon-btn" onclick="openAddModal()">➕ Add Pokemon</button>
        </div>

        <div id="galleryContainer" class="gallery-grid"></div>
        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-state-icon">🎮</div>
            <h2>No Pokemon yet...</h2>
            <p>Add your first Pokemon to start your collection!</p>
        </div>
    </div>

    <!-- Add Pokemon Modal -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeAddModal()">×</button>
            <h2>Add Pokemon</h2>
            
            <div class="image-upload-container" onclick="document.getElementById('imageInput').click()">
                <div id="imagePreview">📸 Click to upload image</div>
                <input type="file" id="imageInput" accept="image/*" style="display: none;" onchange="previewImage(event)">
            </div>

            <button class="submit-btn" onclick="savePokemon()">✨ Add to Collection</button>
        </div>
    </div>

    <!-- Lightbox for viewing full image -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <button class="close-lightbox" onclick="closeLightbox()">×</button>
            <img id="lightboxImage" class="lightbox-image" src="" alt="Pokemon">
        </div>
    </div>

    <script>
        let pokemonCollection = JSON.parse(localStorage.getItem('pokemonPets')) || [];
        let currentImageData = null;

        function renderGallery() {
            const container = document.getElementById('galleryContainer');
            const emptyState = document.getElementById('emptyState');
            
            if (pokemonCollection.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            
            container.innerHTML = pokemonCollection.map((pokemon, index) => `
                <div class="pokemon-card" onclick="openLightbox(${index})">
                    <img src="${pokemon.image}" alt="Pokemon" class="pokemon-image">
                </div>
            `).join('');
        }

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('imagePreview').innerHTML = '📸 Click to upload image';
            currentImageData = null;
        }

        function previewImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImageData = e.target.result;
                    document.getElementById('imagePreview').innerHTML = `<img src="${e.target.result}" style="max-width: 100%; max-height: 200px; border-radius: 10px;">`;
                };
                reader.readAsDataURL(file);
            }
        }

        function savePokemon() {
            if (!currentImageData) {
                alert('Please upload an image!');
                return;
            }

            const newPokemon = {
                image: currentImageData,
                timestamp: new Date().toISOString()
            };

            pokemonCollection.push(newPokemon);
            localStorage.setItem('pokemonPets', JSON.stringify(pokemonCollection));
            
            renderGallery();
            closeAddModal();
        }

        function openLightbox(index) {
            const pokemon = pokemonCollection[index];
            document.getElementById('lightboxImage').src = pokemon.image;
            document.getElementById('lightbox').classList.add('active');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
        }

        // Close lightbox with Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeLightbox();
            }
        });

        // Initial render
        renderGallery();
    </script>
</body>
</html>
