<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Quotes - Cyberlink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black:ital@1&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE7ZLZJ8VY"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-RE7ZLZJ8VY');
    </script>

    <style>
        :root {
            --chrome-pink: #ff0844;
            --chrome-purple: #9d4edd;
            --chrome-blue: #00b4d8;
            --chrome-cyan: #4af2ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            color: #2b2d42;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(235, 235, 235, 0.82);
            pointer-events: none;
        }

        .back-button {
            position: fixed;
            top: 30px;
            left: 30px;
            background: rgba(255, 255, 255, 0.9);
            color: #2b2d42;
            padding: 12px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            border: 2px solid rgba(200, 200, 200, 0.5);
        }

        .back-button:hover {
            background: linear-gradient(135deg, var(--chrome-pink), var(--chrome-purple));
            color: white;
            transform: translateX(-5px);
            border-color: transparent;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 40px 80px;
        }

        .page-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            font-style: italic;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--chrome-pink), var(--chrome-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        .subtitle {
            text-align: center;
            font-size: 1.2rem;
            color: #6c757d;
            margin-bottom: 50px;
        }

        .content-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            padding: 60px 50px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(200, 200, 200, 0.5);
        }

        .quote-container {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
            background: rgba(240, 240, 240, 0.5);
            border-radius: 20px;
            margin-bottom: 40px;
        }

        .quote-icon {
            font-size: 4rem;
            margin-bottom: 30px;
            filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.1));
        }

        .quote-text {
            font-size: 1.5rem;
            line-height: 1.8;
            color: #2b2d42;
            margin-bottom: 30px;
            font-style: italic;
            font-weight: 300;
        }

        .quote-reference {
            font-size: 1.1rem;
            color: var(--chrome-purple);
            font-weight: 700;
        }

        .dice-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--chrome-pink), var(--chrome-purple));
            color: white;
            padding: 20px 50px;
            border: none;
            border-radius: 35px;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 30px rgba(255, 8, 68, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .dice-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(255, 8, 68, 0.4);
        }

        .dice-button:active {
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .container { padding: 100px 25px 60px; }
            .page-title { font-size: 2rem; }
            .content-card { padding: 40px 30px; }
            .quote-text { font-size: 1.2rem; }
            .dice-button { padding: 15px 35px; font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline preload="auto">
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>

    <a href="index.html" class="back-button">← Back</a>

    <div class="container">
        <h1 class="page-title">SPIRIT ✨</h1>
        <p class="subtitle">Universal Uplifting Wisdom</p>

        <div class="content-card">
            <div class="quote-container" id="quoteContainer">
                <div class="quote-icon">✨</div>
                <p class="quote-text" id="quoteText">Click the dice to receive divine wisdom</p>
                <p class="quote-reference" id="quoteReference"></p>
            </div>
            
            <div style="text-align: center;">
                <button class="dice-button" onclick="drawQuote()">🎲 DRAW INSPIRATION</button>
            </div>
        </div>
    </div>

    <script>
        const bibleQuotes = [
            { text: "The only way to do great work is to love what you do.", reference: "Steve Jobs" },
            { text: "Believe you can and you're halfway there.", reference: "Theodore Roosevelt" },
            { text: "The future belongs to those who believe in the beauty of their dreams.", reference: "Eleanor Roosevelt" },
            { text: "It does not matter how slowly you go as long as you do not stop.", reference: "Confucius" },
            { text: "Everything you've ever wanted is on the other side of fear.", reference: "George Addair" },
            { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", reference: "Winston Churchill" },
            { text: "The only impossible journey is the one you never begin.", reference: "Tony Robbins" },
            { text: "In the middle of every difficulty lies opportunity.", reference: "Albert Einstein" },
            { text: "What lies behind us and what lies before us are tiny matters compared to what lies within us.", reference: "Ralph Waldo Emerson" },
            { text: "You are never too old to set another goal or to dream a new dream.", reference: "C.S. Lewis" },
            { text: "The best time to plant a tree was 20 years ago. The second best time is now.", reference: "Chinese Proverb" },
            { text: "Your time is limited, don't waste it living someone else's life.", reference: "Steve Jobs" },
            { text: "Be yourself; everyone else is already taken.", reference: "Oscar Wilde" },
            { text: "The only person you are destined to become is the person you decide to be.", reference: "Ralph Waldo Emerson" },
            { text: "Life is 10% what happens to you and 90% how you react to it.", reference: "Charles R. Swindoll" },
            { text: "Don't watch the clock; do what it does. Keep going.", reference: "Sam Levenson" },
            { text: "The best way to predict the future is to create it.", reference: "Peter Drucker" },
            { text: "You miss 100% of the shots you don't take.", reference: "Wayne Gretzky" },
            { text: "Whether you think you can or you think you can't, you're right.", reference: "Henry Ford" },
            { text: "The only limit to our realization of tomorrow will be our doubts of today.", reference: "Franklin D. Roosevelt" }
        ];

        let quoteHistory = JSON.parse(localStorage.getItem('spiritQuoteHistory') || '[]');

        function drawQuote() {
            let newQuote;
            let attempts = 0;
            const maxAttempts = 50;

            // Keep trying until we get a quote not in recent history
            do {
                newQuote = bibleQuotes[Math.floor(Math.random() * bibleQuotes.length)];
                attempts++;
            } while (quoteHistory.includes(newQuote.reference) && attempts < maxAttempts);

            // Update history (keep last 5)
            quoteHistory.push(newQuote.reference);
            if (quoteHistory.length > 5) {
                quoteHistory.shift();
            }
            localStorage.setItem('spiritQuoteHistory', JSON.stringify(quoteHistory));

            // Display quote with animation
            const container = document.getElementById('quoteContainer');
            container.style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('quoteText').textContent = `"${newQuote.text}"`;
                document.getElementById('quoteReference').textContent = newQuote.reference;
                container.style.transition = 'opacity 0.5s';
                container.style.opacity = '1';
            }, 300);
        }
    </script>
</body>
</html>
