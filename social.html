<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Services - Cyberlink</title>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-RE7ZLZJ8VY"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-RE7ZLZJ8VY');
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e0e8f0 100%);
            color: #2b2d42;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(157, 78, 221, 0.3) !important;
            border-radius: 50px;
            color: #9d4edd;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 1);
            border-color: #9d4edd !important;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding-top: 60px;
        }

        .page-title {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3rem;
            font-style: italic;
            text-align: center;
            background: linear-gradient(135deg, #ff4db0, #c060ff, #00d4ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #6c757d;
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        .coming-soon {
            text-align: center;
            padding: 100px 20px;
        }

        .coming-soon-icon {
            font-size: 6rem;
            margin-bottom: 30px;
        }

        .coming-soon-text {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff4db0, #9d4edd);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @media (max-width: 768px) {
            .page-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-button">← Back to Home</a>

    <div class="container">
        <h1 class="page-title">SOCIAL MEDIA SERVICES</h1>
        <p class="subtitle">Amplify your presence</p>

        <div class="coming-soon">
            <div class="coming-soon-icon">📱</div>
            <div class="coming-soon-text">Coming Soon</div>
        </div>
    </div>
</body>
</html>
