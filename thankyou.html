<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Cyberlink</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --chrome-pink: #ff3d9a;
            --chrome-purple: #9d4edd;
            --chrome-blue: #00b4d8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: #2b2d42;
            overflow-x: hidden;
            position: relative;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .video-background video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .video-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        .thank-you-container {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 80px 40px;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(255, 61, 154, 0.3);
        }

        .success-icon {
            font-size: 6rem;
            margin-bottom: 30px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }

        h1 {
            font-family: 'Archivo Black', sans-serif;
            font-size: 3.5rem;
            font-style: italic;
            background: linear-gradient(135deg, var(--chrome-pink), var(--chrome-purple), var(--chrome-blue));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: -2px;
        }

        p {
            font-size: 1.3rem;
            color: #6c757d;
            line-height: 1.8;
            margin-bottom: 40px;
        }

        .back-button {
            display: inline-block;
            padding: 20px 50px;
            background: linear-gradient(135deg, var(--chrome-pink), var(--chrome-purple));
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 35px;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(255, 61, 154, 0.4);
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 61, 154, 0.6);
        }

        .tagline {
            font-family: 'Courier New', monospace;
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 6px;
            margin-top: 40px;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: colorGlow 3s linear infinite;
        }

        .tagline::first-letter {
            text-transform: uppercase;
        }

        @keyframes colorGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            .success-icon { font-size: 4rem; }
            .thank-you-container { padding: 50px 30px; margin: 20px; }
        }
    </style>
</head>
<body>
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="bg.mp4" type="video/mp4">
        </video>
    </div>

    <div class="thank-you-container">
        <div class="success-icon">✨</div>
        <h1>You're In!</h1>
        <p>
            Thank you for signing up! We'll keep you updated on all the exciting things coming to Cyberlink. 
            Get ready to connect in ways you've never imagined.
        </p>
        <a href="index.html" class="back-button">Back to Home</a>
        <p class="tagline">cyberlink</p>
    </div>
</body>
</html>
